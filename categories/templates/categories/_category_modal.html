{% load i18n %}
<div class="modal fade" id="manageCategoriesModal" tabindex="-1" aria-labelledby="manageCategoriesModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="manageCategoriesModalLabel">
          <i class="fas fa-gear me-2"></i>{% trans 'Manage categories' %}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans 'Close' %}"></button>
      </div>
      <div class="modal-body">
        <ul class="cat-mgr-list" id="catMgrList"></ul>
        <div class="cat-mgr-error" id="catMgrError" style="display:none;"></div>
        <div class="cat-mgr-add-row" id="catMgrAddRow">
          <input type="text" class="cat-mgr-input" id="catMgrNewName" placeholder="{% trans 'Category name' %}" maxlength="100">
          <input type="text" class="cat-mgr-input" id="catMgrNewDesc" placeholder="{% trans 'Description (optional)' %}">
          <button type="button" class="btn btn-sm btn-primary" id="catMgrAddBtn">
            <i class="fas fa-plus me-1"></i>{% trans 'Add category' %}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
