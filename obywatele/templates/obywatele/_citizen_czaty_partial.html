{% load i18n profile_tags %}
{% if rows %}
  <div class="table-responsive">
    <table class="table table-sm table-striped table-hover-rows mb-0">
      <thead>
        <tr>
          <th>{% trans "Room" %}</th>
          <th>{% trans "Message" %}</th>
          <th>{% trans "Date" %}</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
          <tr data-href="{% url 'chat:chat' %}#room_id={{ row.room.id }}&message_id={{ row.msg.id }}">
            <td class="td-link text-nowrap">
              <a href="{% url 'chat:chat' %}#room_id={{ row.room.id }}&message_id={{ row.msg.id }}">{{ row.room_name }}</a>
            </td>
            <td class="td-link td-truncate">
              <a href="{% url 'chat:chat' %}#room_id={{ row.room.id }}&message_id={{ row.msg.id }}">{{ row.msg.text|plain_text|truncatechars:80 }}</a>
            </td>
            <td class="text-muted text-nowrap">
              {{ row.msg.time|date:"d.m.Y H:i" }}
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="text-muted p-3 mb-0 citizen-tab-empty">{% trans "No chats found." %}</p>
{% endif %}
