{% extends 'home/base.html' %}
{% load i18n %}

{% block content %}
<div class="section">
  <div class="card">
    <div class="card-header">
      <span class="section-heading">{% trans 'Delete attachment' %}</span>
    </div>
    <div class="card-body">
      <p>{% trans 'Are you sure you want to delete the attachment' %} "{{ attachment.filename }}"?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">{% trans 'Delete' %}</button>
        <a href="{% url 'board:edit_post' post.pk %}" class="btn btn-secondary">{% trans 'Cancel' %}</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
